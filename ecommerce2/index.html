<html>

<head>
    <title>Fruit Store</title>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>

<!-- HEADER -->

<header>
    <nav class="navbar contain">

        <div class="nav-left">
        <img src="images/logo.png" alt="Fruit Store Logo" class="logo">

        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Fruits</a>
        <a href="#" class="nav-link">Contact</a>
    </div>

    <div class="nav-right">
        <input type="text" placeholder="Search fruits..." class="search-box">
    </div>

</nav>
<div class="banner-content contain">

    <div class="banner-text">
        <h1>Fresh Mango For Your Kitchen</h1>
        <p>Sweet tropical mangoes directly from the farm</p>
        <h2>$4.99</h2>

        <button class="buy-button">Buy Now</button>
    </div>

    <div class="banner-image">
        <img src="images/mango.png" alt="Mango">
    </div>

</div>
<div class="title-container">
    <p class="main-title">Fruits</p>
    <p class="sub-title">Fresh and Natural</p>
</div>

<div class="product-rows">

    <!-- APPLE -->

    <div class="product">
        <img src="images/apple.png" alt="Apple" class="product-image">

        <div class="product-info">
            <span class="info-name">Apple</span>
            <span>Fresh Fruit</span>
            <span class="price">$2.50</span>

            <button class="buy-now">Buy Now</button>
        </div>
    </div>


    <!-- BANANA -->

    <div class="product">
        <img src="images/banana.png" alt="Banana" class="product-image">

        <div class="product-info">
            <span class="info-name">Banana</span>
            <span>Fresh Fruit</span>
            <span class="price">$1.80</span>

            <button class="buy-now">Buy Now</button>
        </div>
    </div>


    <!-- STRAWBERRY -->

    <div class="product">
        <img src="images/strawberry.png" alt="Strawberry" class="product-image">

        <div class="product-info">
            <span class="info-name">Strawberry</span>
            <span>Fresh Fruit</span>
            <span class="price">$3.20</span>

            <button class="buy-now">Buy Now</button>
        </div>
    </div>


    <!-- PINEAPPLE -->

    <div class="product">
        <img src="images/pineapple.png" alt="Pineapple" class="product-image">

        <div class="product-info">
            <span class="info-name">Pineapple</span>
            <span>Fresh Fruit</span>
            <span class="price">$4.10</span>

            <button class="buy-now">Buy Now</button>
        </div>
    </div>

</div>
<div class="footer-content contain">

    <div class="footer-text">
        <h2>LET'S STAY IN TOUCH</h2>
        <p>Get updates on sales specials and more</p>
    </div>

    <form class="contact-form">
        <input type="email" placeholder="Enter your email">
        <button type="submit">Subscribe</button>
    </form>

</div>


</body>
</html>
