<!--Cree una pequeña página web con un botón y un <p> donde al presionar el botón, 
cambia el color del fondo del <p> por uno aleatorio de la siguiente lista 
[red, blue, green, yellow, cyan, pink]. 
Para el texto puede utilzar un Lorem Ipsum corto, solamente para rellenar el espacio. 
La acción del botón debe agregarla con un listener-->

<!DOCTYPE html>
<html>
<head>
    <title>Random Color</title>
</head>
<body>

    <button id="colorBtn">Change color</button>

    <p id="text">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    </p>

    <script>
        let colors = ["red", "blue", "green", "yellow", "cyan", "pink"];

        let button = document.getElementById("colorBtn");
        let paragraph = document.getElementById("text");

        button.addEventListener("click", function() {
            let randomIndex = Math.floor(Math.random() * colors.length);
            paragraph.style.backgroundColor = colors[randomIndex];
        });
    </script>

</body>
</html>
