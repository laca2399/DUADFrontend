<!--Construya un pequeño contenedor con HTML donde haya espacios para un input y un botón. 
Al presionar el botón tome el valor ingresado al input y realice la solicitud al endpoint utilizado en los dos ejercicios anteriores. 
Si la solicitud fue exitosa, muestre nombre, apellido y correo del usuario. Si la solicitud falló, 
muestre un mensaje de error en pantalla.-->

<!DOCTYPE html>
<html>
<head>
    <title>Fetch User</title>
</head>
<body>

    <input type="number" id="userId" placeholder="Enter user ID">
    <button id="btn">Get User</button>

    <p id="result"></p>

    <script>
        async function getUser() {
            console.log("1. Sending request");

            const id = document.getElementById("userId").value;
            const result = document.getElementById("result");

            result.textContent = "Loading...";

            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users/" + id);
                console.log("2. Response received");

                const user = await response.json();
                console.log(user);

                if (!user.id) {
                    throw new Error("User not found");
                }

                console.log("User data:");
                console.log("ID:", user.id);
                console.log("Name:", user.name);
                console.log("Email:", user.email);

                result.textContent =
                    "Name: " + user.name +
                    " | Email: " + user.email;

            } catch (error) {
                console.log("Error:", error.message);
                result.textContent = "Error: User not found";
            }

            console.log("3. Finished");
        }

        document.getElementById("btn").addEventListener("click", getUser);

        console.log("4. End of program");
    </script>

</body>
</html>
