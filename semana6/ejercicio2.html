<!--Crea un documento HTML con un input de texto y un botón, 
donde al presionar el botón se toman los datos y se muestran en pantalla. 
Al presionar el botón también se limpia el input. Si se agregan datos nuevos, 
se sustituyen los anteriores y se repite el proceso.-->

<!DOCTYPE html>
<html>
<head>
    <title>Input Example</title>
</head>
<body>

    <input type="text" id="myInput">
    <button onclick="showText()">Show</button>

    <p id="output"></p>

    <script>
        function showText() {
            let input = document.getElementById("myInput");
            let output = document.getElementById("output");

            output.textContent = input.value;
            input.value = "";
        }
    </script>

</body>
</html>
